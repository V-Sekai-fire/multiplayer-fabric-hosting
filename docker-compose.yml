services:
  # Generate CockroachDB TLS certificates into a shared volume.
  # Runs as uid 1000 (cockroach) so that the crdb server can read the 600-permission key files.
  # Zone-backend runs as root and can read any file regardless of permissions.
  crdb-certs-init:
    image: ghcr.io/v-sekai/cockroach:latest
    platform: linux/amd64
    user: "0:0"
    volumes:
      - ./certs/crdb:/certs
    entrypoint: >
      /bin/sh -c "
        set -e
        [ -f /certs/ca.crt ] && exit 0
        cockroach cert create-ca --certs-dir=/certs --ca-key=/certs/ca.key --allow-ca-key-reuse --lifetime=2190000h
        cockroach cert create-node localhost crdb 127.0.0.1 ::1 --certs-dir=/certs --ca-key=/certs/ca.key --lifetime=876000h
        cockroach cert create-client root --certs-dir=/certs --ca-key=/certs/ca.key --lifetime=876000h
        chown -R 1000:1000 /certs
      "

  # CockroachDB single-node (our fork)
  # Admin UI: http://localhost:8080
  crdb:
    image: ghcr.io/v-sekai/cockroach:latest
    platform: linux/amd64
    command: start-single-node --certs-dir=/certs --listen-addr=:26257 --http-addr=:8080
    ports:
      - "26257:26257"
      - "8181:8080"   # admin UI — 8080 occupied by rvk-api-service
    volumes:
      - crdbdata:/cockroach/cockroach-data
      - ./certs/crdb:/certs:ro
    depends_on:
      crdb-certs-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "cockroach", "sql", "--certs-dir=/certs", "-e", "SELECT 1"]
      interval: 5s
      timeout: 5s
      retries: 10

  # S3-compatible gateway backed by local POSIX filesystem (replaces Tigris locally)
  versitygw:
    image: ghcr.io/versity/versitygw:latest
    command: -a ${AWS_ACCESS_KEY_ID} -s ${AWS_SECRET_ACCESS_KEY} posix /data
    ports:
      - "7070:7070"   # S3 API
    volumes:
      - versitygwdata:/data
    healthcheck:
      test: ["CMD", "sh", "-c", "wget -qO/dev/null http://localhost:7070/ 2>&1 | grep -q 'HTTP'"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  versitygw-init:
    image: amazon/aws-cli:latest
    depends_on:
      versitygw:
        condition: service_healthy
    environment:
      AWS_ACCESS_KEY_ID: "${AWS_ACCESS_KEY_ID}"
      AWS_SECRET_ACCESS_KEY: "${AWS_SECRET_ACCESS_KEY}"
      AWS_DEFAULT_REGION: us-east-1
    entrypoint: >
      /bin/sh -c "
        aws --endpoint-url http://versitygw:7070 s3 mb s3://uro-uploads --region us-east-1 || true
        aws --endpoint-url http://versitygw:7070 s3 mb s3://zone-chunks --region us-east-1 || true
      "

  # Phoenix API — named 'uro' so Caddy can proxy to it.
  # Chunk delivery (/chunks/*) is now handled by AriaStorage.ChunkServerPlug
  # inside uro — the separate desync container has been removed.
  # The baker spawner calls URO_URL=http://uro:4000 from inside Docker.
  uro:
    build:
      context: ../multiplayer-fabric-zone-backend
      dockerfile: Dockerfile
      args:
        - COMPILE_PHASE=true
    image: multiplayer-fabric-hosting-uro
    environment:
      COMPILE_PHASE: "false"
      DATABASE_URL: "postgresql://root@crdb:26257/vsekai?sslmode=verify-full"
      CRDB_CA_CERT: "/certs/ca.crt"
      CRDB_CLIENT_CERT: "/certs/client.root.crt"
      CRDB_CLIENT_KEY: "/certs/client.root.key"
      URL: "${URL:-https://hub-700a.chibifire.com/api/v1/}"
      ROOT_ORIGIN: "${ROOT_ORIGIN:-https://hub-700a.chibifire.com}"
      FRONTEND_URL: "${FRONTEND_URL:-https://hub-700a.chibifire.com/}"
      PORT: "4000"
      PHOENIX_KEY_BASE: "${PHOENIX_KEY_BASE}"
      JOKEN_SIGNER: "${JOKEN_SIGNER}"
      AWS_S3_BUCKET: "uro-uploads"
      AWS_S3_ENDPOINT: "http://versitygw:7070"
      AWS_ACCESS_KEY_ID: "${AWS_ACCESS_KEY_ID}"
      AWS_SECRET_ACCESS_KEY: "${AWS_SECRET_ACCESS_KEY}"
      VERSITYGW_URL: "http://versitygw:7070"
      URO_URL: "http://uro:4000"
      ADMIN_PASSWORD: "${ADMIN_PASSWORD}"
      USER_PASSWORD: "${USER_PASSWORD}"
      BAKER_TOKEN: "${BAKER_TOKEN:-}"
      BAKER_NETWORK: "multiplayer-fabric-hosting_default"
      SENDGRID_API_KEY: "${SENDGRID_API_KEY:-}"
      TURNSTILE_SECRET_KEY: "${TURNSTILE_SECRET_KEY:-1x0000000000000000000000000000000AA}"
      SIGNUP_API_KEY: "${SIGNUP_API_KEY:-}"
      OAUTH2_GITHUB_CLIENT_ID: "${OAUTH2_GITHUB_CLIENT_ID:-}"
      OAUTH2_GITHUB_CLIENT_SECRET: "${OAUTH2_GITHUB_CLIENT_SECRET:-}"
      OAUTH2_DISCORD_CLIENT_ID: "${OAUTH2_DISCORD_CLIENT_ID:-}"
      OAUTH2_DISCORD_CLIENT_SECRET: "${OAUTH2_DISCORD_CLIENT_SECRET:-}"
      MIX_ENV: "prod"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./certs/crdb:/certs:ro
    depends_on:
      crdb:
        condition: service_healthy
      versitygw-init:
        condition: service_completed_successfully

  # Next.js frontend.
  # Built after 'uro' so the Dockerfile can copy openapi.json from the uro image.
  frontend:
    build:
      context: ../multiplayer-fabric-zone-backend/frontend
      dockerfile: Dockerfile
      args:
        uro_image: multiplayer-fabric-hosting-uro
    environment:
      NEXT_PUBLIC_ORIGIN: "${URL_ROOT:-https://hub-700a.chibifire.com}"
      NEXT_PUBLIC_API_ORIGIN: "${URL:-https://hub-700a.chibifire.com/api/v1}"
      API_ORIGIN: "http://uro:4000"
      NEXT_PUBLIC_TURNSTILE_SITEKEY: "${TURNSTILE_SITEKEY:-1x00000000000000000000AA}"
    depends_on:
      - uro

  # Caddy reverse proxy — terminates TLS with Cloudflare Origin Certificate.
  # Cloudflare proxies (orange cloud) in Full (strict) mode; port 443 must be forwarded
  # on the host router to this machine.
  # Routes: /api/v1/* → uro:4000 (prefix stripped), /* → frontend:3000
  zone-backend:
    image: caddy:2.9.1-alpine
    ports:
      - "80:80"
      - "443:443"
      - "8888:8888"   # local QA: HTTP API without TLS (API_ORIGIN=http://localhost:8888)
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - ./certs:/etc/caddy/certs:ro
      - caddydata:/data
      - caddyconfig:/config
    depends_on:
      - uro
      - frontend

  # Cloudflare Tunnel — disabled; direct port-443 serving replaces it.
  # Re-enable by uncommenting if direct port forwarding is unavailable.
  # cloudflared:
  #   image: cloudflare/cloudflared:latest
  #   command: tunnel --no-autoupdate run --protocol http2 --token ${CLOUDFLARE_TUNNEL_TOKEN}
  #   depends_on:
  #     - zone-backend
  #   restart: unless-stopped

  # Godot zone server — one embedded zone instance.
  # Zone servers have multiplicity 0..∞; each registers itself with Uro at startup.
  # For additional zones, run separate zone-fabric containers pointing at this stack's Uro API.
  zone-server:
    image: ghcr.io/v-sekai-fire/zone-fabric:latest
    platform: linux/amd64
    environment:
      GODOT_HEADLESS: "1"
      WEBTRANSPORT_HOST: "${ZONE_HOST}"
      WEBTRANSPORT_PORT: "${ZONE_PORT:-7443}"
    ports:
      - "7443:7443/udp"   # WebTransport (QUIC)
    depends_on:
      - zone-backend

volumes:
  crdbdata:
  versitygwdata:
  caddydata:
  caddyconfig:
