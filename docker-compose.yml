services:
  # CockroachDB single-node (our fork)
  # Admin UI: http://localhost:8080
  crdb:
    image: ghcr.io/v-sekai/cockroach:latest
    command: start-single-node --insecure --listen-addr=0.0.0.0:26257 --http-addr=0.0.0.0:8080
    ports:
      - "26257:26257"
      - "8080:8080"
    volumes:
      - crdbdata:/cockroach/cockroach-data
    healthcheck:
      test: ["CMD", "cockroach", "sql", "--insecure", "-e", "SELECT 1"]
      interval: 5s
      timeout: 5s
      retries: 10

  # S3-compatible gateway backed by local POSIX filesystem (replaces Tigris locally)
  versitygw:
    image: ghcr.io/versity/versitygw:latest
    command: -a minioadmin -s minioadmin posix /data
    ports:
      - "7070:7070"   # S3 API
    volumes:
      - versitygwdata:/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:7070/"]
      interval: 10s
      timeout: 5s
      retries: 5

  versitygw-init:
    image: amazon/aws-cli:latest
    depends_on:
      versitygw:
        condition: service_healthy
    environment:
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      AWS_DEFAULT_REGION: us-east-1
    entrypoint: >
      /bin/sh -c "
        aws --endpoint-url http://versitygw:7070 s3 mb s3://uro-uploads --region us-east-1 || true
      "

  zone-backend:
    build:
      context: ../multiplayer-fabric-zone-backend
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: "postgresql://root@crdb:26257/vsekai?sslmode=disable"
      URL: "${URL:-https://vsekai.example.com/api/v1/}"
      ROOT_ORIGIN: "${ROOT_ORIGIN:-https://vsekai.example.com}"
      FRONTEND_URL: "${FRONTEND_URL:-https://vsekai.example.com/}"
      PORT: "4000"
      AWS_S3_BUCKET: "uro-uploads"
      AWS_S3_ENDPOINT: "http://versitygw:7070"
      AWS_ACCESS_KEY_ID: "minioadmin"
      AWS_SECRET_ACCESS_KEY: "minioadmin"
      MIX_ENV: "prod"
    depends_on:
      crdb:
        condition: service_healthy
      versitygw-init:
        condition: service_completed_successfully

  # Cloudflare Tunnel — exposes zone-backend to the internet via Cloudflare edge.
  # Cloudflare edge handles TLS termination and serves HTTP/1.1 + HTTP/3 to clients.
  # Routing (hostname → service) is configured in the Cloudflare dashboard.
  # Get a token: https://one.dash.cloudflare.com/ → Networks → Tunnels → Create tunnel
  cloudflared:
    image: cloudflare/cloudflared:latest
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      - zone-backend
    restart: unless-stopped

  # Godot zone server — WebTransport/HTTP3 direct on UDP 7777.
  # Cloudflare Tunnel does not proxy QUIC sessions, so this remains direct.
  # Clients connect with cert-hash pinning against the self-signed cert.
  zone-server:
    image: ghcr.io/v-sekai-fire/multiplayer-fabric-godot-server:latest
    environment:
      GODOT_HEADLESS: "1"
    ports:
      - "7777:7777/udp"   # WebTransport (QUIC)
    depends_on:
      - zone-backend

volumes:
  crdbdata:
  versitygwdata:
